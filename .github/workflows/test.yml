name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Minimal env vars so the app can import without crashing
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  ANTHROPIC_API_KEY: "sk-test-placeholder"
  CLERK_JWKS_URL: "https://example.clerk.accounts.dev/.well-known/jwks.json"
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  REDIS_URL: "redis://localhost:6379/0"
  SECRET_KEY: "test-secret-key-at-least-32-chars-long!!"
  ENVIRONMENT: "development"
  NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --timeout=60
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ── Frontend tests ────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test -- --coverage --reporter=verbose

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── E2E tests ─────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E (Playwright / Chromium)
    runs-on: ubuntu-latest
    # E2E only runs on PRs and main push to avoid running on every feature branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium only
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"

      - name: Run Playwright E2E tests (Chromium)
        working-directory: frontend
        run: npx playwright test --project=chromium
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
